services:
  web:
    container_name: php-apache.service.ESDLC
    build: .
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./src:/var/www/html

  db:
    container_name: mariadb.service.ESDLC
    image: mariadb:10.4.32
    environment:
     MYSQL_ROOT_PASSWORD: 1234
     MYSQL_DATABASE: ESDLC
    ports:
      - "3306:3306"
    volumes:
      - database:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
      
volumes:
  database: